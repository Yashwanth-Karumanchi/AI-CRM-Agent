services:
  - type: web
    name: ai-crm-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: API_USERNAME
        sync: false
      - key: API_PASSWORD
        sync: false
      - key: GMAIL_ADDRESS
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false