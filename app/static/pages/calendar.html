<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/aria.css">
</head>
<body>
<div class="app-layout">

    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-logo">
                <svg width="20" height="20" viewBox="0 0 20 20"
                     fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="10" cy="10" r="3"/>
                    <path stroke-linecap="round"
                        d="M10 2v2m0 12v2M2 10h2m12 0h2
                           M4.93 4.93l1.41 1.41m7.32 7.32l1.41 1.41
                           M4.93 15.07l1.41-1.41m7.32-7.32l1.41-1.41"/>
                </svg>
            </div>
            <div>
                <div class="topbar-title">ARIA</div>
                <div class="topbar-subtitle">AI Relationship Intelligence</div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="status-badge">
                <span class="status-badge-dot"></span>
                Connected
            </div>
            <button class="btn btn-secondary btn-sm"
                onclick="Nav.logout()">
                <svg width="16" height="16" viewBox="0 0 20 20"
                     fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0
                           01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3
                           3 0 013 3v1"/>
                </svg>
                Sign Out
            </button>
        </div>
    </div>

    <div class="app-body">

        <!-- Sidebar -->
        <div class="sidebar">
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-label">Main</div>
                    <a href="/aria/dashboard" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="13" y="3" width="4" height="4" rx="1"/><rect x="13" y="10" width="4" height="7" rx="1"/><rect x="3" y="13" width="7" height="4" rx="1"/></svg>
                        Dashboard
                    </a>
                    <a href="/aria/clients" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20H7m10 0v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2m14-10a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        Clients
                    </a>
                    <a href="/aria/chat" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        Chat with ARIA
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-label">Tools</div>
                    <a href="/aria/calendar" class="nav-item active">
                        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                        Calendar
                    </a>
                    <a href="/aria/email" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        Email
                    </a>
                    <a href="/aria/reports" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Reports
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-label">Intelligence</div>
                    <a href="/aria/intel" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path stroke-linecap="round" d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                        Intelligence
                    </a>
                    <a href="/aria/search" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
                        Smart Search
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-label">Data</div>
                    <a href="/aria/import" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        Bulk Import
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-stats" id="sidebarStats">
                    <div class="text-muted text-xs">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Main -->
        <div class="main-content">
            <div class="page">

                <!-- Header -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Calendar</h1>
                        <p class="page-subtitle">
                            Upcoming meetings and client consultations
                        </p>
                    </div>
                    <div class="flex gap-2 items-center">
                        <select id="daysFilter"
                            class="input select"
                            style="width:160px"
                            onchange="loadMeetings()"
                            aria-label="Filter meetings by time range">
                            <option value="7">Next 7 days</option>
                            <option value="14">Next 14 days</option>
                            <option value="30" selected>Next 30 days</option>
                            <option value="90">Next 90 days</option>
                        </select>
                        <button class="btn btn-secondary btn-sm"
                            onclick="loadMeetings()"
                            aria-label="Refresh meetings">
                            <svg width="16" height="16" viewBox="0 0 20 20"
                                 fill="none" stroke="currentColor"
                                 stroke-width="1.5">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M4 4v5h5M16 16v-5h-5"/>
                                <path stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M20.49 9A9 9 0 005.64 5.64L4 8
                                       m12 8l-1.64 2.36A9 9 0 013.51 11"/>
                            </svg>
                            Refresh
                        </button>
                        <button class="btn btn-primary btn-sm"
                            onclick="openModal('scheduleMeetingModal')">
                            <svg width="16" height="16" viewBox="0 0 20 20"
                                 fill="none" stroke="currentColor"
                                 stroke-width="1.5">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M12 4v16m8-8H4"/>
                            </svg>
                            Schedule Meeting
                        </button>
                    </div>
                </div>

                <!-- Error banner -->
                <div id="errorBanner" class="alert alert-error mb-4 hidden">
                    <svg width="16" height="16" viewBox="0 0 20 20"
                         fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="10" cy="10" r="8"/>
                        <path stroke-linecap="round" d="M10 7v4m0 2v1"/>
                    </svg>
                    <span id="errorMsg"></span>
                </div>

                <!-- Meetings List -->
                <div id="meetingsList">
                    <div class="loading-overlay">
                        <div class="loading-spinner"></div>
                        Loading meetings...
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Schedule Meeting Modal -->
<div id="scheduleMeetingModal"
     class="modal-overlay"
     role="dialog"
     aria-modal="true"
     aria-labelledby="scheduleModalTitle">
    <div class="modal modal-md">
        <div class="modal-header">
            <span class="modal-title" id="scheduleModalTitle">
                Schedule Meeting
            </span>
            <button class="btn btn-ghost btn-icon btn-sm"
                onclick="closeModal('scheduleMeetingModal')"
                aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 20 20"
                     fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label class="input-label" for="meetClientId">
                    Client ID *
                </label>
                <input id="meetClientId"
                    class="input"
                    placeholder="CL-XXXXXXXX"
                    autocomplete="off">
            </div>
            <div class="input-group">
                <label class="input-label" for="meetTitle">
                    Meeting Title
                </label>
                <input id="meetTitle"
                    class="input"
                    placeholder="e.g. Initial Consultation">
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label" for="meetStart">
                        Start Time *
                    </label>
                    <input id="meetStart"
                        type="datetime-local"
                        class="input">
                </div>
                <div class="input-group">
                    <label class="input-label" for="meetEnd">
                        End Time *
                    </label>
                    <input id="meetEnd"
                        type="datetime-local"
                        class="input">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label" for="meetLocation">
                    Location
                </label>
                <div class="input-with-icon">
                    <svg class="input-icon" viewBox="0 0 20 20"
                         fill="none" stroke="currentColor"
                         stroke-width="1.5">
                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M17.657 16.657L13.414 20.9a1.998 1.998
                               0 01-2.827 0l-4.244-4.243a8 8 0
                               1111.314 0z"/>
                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <input id="meetLocation"
                        class="input"
                        placeholder="Google Meet, Zoom, Office address...">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label" for="meetDesc">
                    Description
                </label>
                <textarea id="meetDesc"
                    class="input textarea"
                    rows="2"
                    placeholder="Agenda or notes for this meeting..."></textarea>
            </div>
            <label class="flex items-center gap-2"
                style="cursor:pointer;user-select:none">
                <input id="meetInvite"
                    type="checkbox"
                    style="width:16px;height:16px">
                <span class="text-sm text-secondary">
                    Send calendar invite to client
                </span>
            </label>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary"
                onclick="closeModal('scheduleMeetingModal')">
                Cancel
            </button>
            <button class="btn btn-primary"
                onclick="scheduleMeeting()"
                id="scheduleBtn">
                <svg width="16" height="16" viewBox="0 0 20 20"
                     fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
                Schedule Meeting
            </button>
        </div>
    </div>
</div>

<!-- Notes Modal -->
<div id="notesModal"
     class="modal-overlay"
     role="dialog"
     aria-modal="true"
     aria-labelledby="notesModalTitle">
    <div class="modal modal-md">
        <div class="modal-header">
            <span class="modal-title" id="notesModalTitle">
                Add Meeting Notes
            </span>
            <button class="btn btn-ghost btn-icon btn-sm"
                onclick="closeModal('notesModal')"
                aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 20 20"
                     fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label class="input-label" for="notesText">Notes</label>
                <textarea id="notesText"
                    class="input textarea"
                    rows="6"
                    placeholder="Enter meeting notes, action items, follow-ups...">
                </textarea>
            </div>
            <input type="hidden" id="notesEventId">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary"
                onclick="closeModal('notesModal')">
                Cancel
            </button>
            <button class="btn btn-primary"
                onclick="saveNotes()"
                id="saveNotesBtn">
                <svg width="16" height="16" viewBox="0 0 20 20"
                     fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M5 13l4 4L19 7"/>
                </svg>
                Save Notes
            </button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/nav.js"></script>
<script>
// ── Init ───────────────────────────────────────────────
Nav.init();

// ── Load Meetings ──────────────────────────────────────
async function loadMeetings() {
    const days = document.getElementById('daysFilter').value;
    const container = document.getElementById('meetingsList');
    document.getElementById('errorBanner').classList.add('hidden');

    container.innerHTML = `
        <div class="loading-overlay">
            <div class="loading-spinner"></div>
            Loading meetings...
        </div>
    `;

    try {
        const res = await API.get(
            `/meetings?days_ahead=${days}&max_results=50`
        );
        const meetings = res.meetings || [];

        if (!meetings.length) {
            container.innerHTML = `
                <div class="card">
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg viewBox="0 0 20 20" fill="none"
                                 stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="4" width="18" height="18"
                                      rx="2" ry="2"/>
                                <path d="M16 2v4M8 2v4M3 10h18"/>
                            </svg>
                        </div>
                        <div class="empty-state-title">
                            No meetings scheduled
                        </div>
                        <div class="empty-state-desc">
                            No meetings in the next ${days} days.
                            Schedule one to get started.
                        </div>
                    </div>
                </div>
            `;
            return;
        }

        container.innerHTML = meetings.map(m => {
            const start = formatDateTime(m.start_time);
            const end   = formatDateTime(m.end_time);

            return `
            <div class="card mb-3">
                <div class="card-body">
                    <div class="flex justify-between items-start gap-4">
                        <div style="min-width:0;flex:1">

                            <!-- Title -->
                            <div class="font-semibold text-lg mb-1 truncate">
                                ${escapeHtml(m.title || 'Untitled Meeting')}
                            </div>

                            <!-- Time -->
                            <div class="flex items-center gap-2
                                        text-sm text-muted mb-2">
                                <svg width="14" height="14"
                                     viewBox="0 0 20 20" fill="none"
                                     stroke="currentColor"
                                     stroke-width="1.5">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M12 6v6l4 2"/>
                                </svg>
                                ${start}
                                <span class="text-light">→</span>
                                ${end}
                            </div>

                            <!-- Location -->
                            ${m.location ? `
                            <div class="flex items-center gap-2
                                        text-sm text-secondary mb-2">
                                <svg width="14" height="14"
                                     viewBox="0 0 20 20" fill="none"
                                     stroke="currentColor"
                                     stroke-width="1.5">
                                    <path stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M17.657 16.657L13.414 20.9a2
                                           2 0 01-2.827 0l-4.244-4.243a8
                                           8 0 1111.314 0z"/>
                                    <path stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                                ${escapeHtml(m.location)}
                            </div>
                            ` : ''}

                            <!-- Description -->
                            ${m.description ? `
                            <div class="text-xs text-muted mt-2"
                                 style="max-width:520px;line-height:1.5">
                                ${escapeHtml(m.description.slice(0, 200))}
                                ${m.description.length > 200 ? '...' : ''}
                            </div>
                            ` : ''}

                            <!-- Attendees -->
                            ${m.attendees?.length ? `
                            <div class="flex items-center gap-2
                                        text-xs text-accent mt-2">
                                <svg width="12" height="12"
                                     viewBox="0 0 20 20" fill="none"
                                     stroke="currentColor"
                                     stroke-width="1.5">
                                    <path stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M17 20H7m10 0v-2a4 4 0
                                           00-4-4H7a4 4 0 00-4 4v2m14-10
                                           a4 4 0 11-8 0 4 4 0 018 0z"/>
                                </svg>
                                ${m.attendees.map(a =>
                                    escapeHtml(a)
                                ).join(', ')}
                            </div>
                            ` : ''}
                        </div>

                        <!-- Actions -->
                        <div class="flex gap-2 flex-shrink-0">
                            ${m.meet_link ? `
                            <a href="${escapeHtml(m.meet_link)}"
                               target="_blank"
                               rel="noopener noreferrer"
                               class="btn btn-secondary btn-sm">
                                <svg width="14" height="14"
                                     viewBox="0 0 20 20" fill="none"
                                     stroke="currentColor"
                                     stroke-width="1.5">
                                    <polygon stroke-linecap="round"
                                        stroke-linejoin="round"
                                        points="23 7 16 12 23 17 23 7"/>
                                    <rect x="1" y="5" width="15"
                                          height="14" rx="2" ry="2"/>
                                </svg>
                                Join
                            </a>
                            ` : ''}
                            <button class="btn btn-secondary btn-sm"
                                onclick="openNotesModal('${escapeHtml(m.event_id)}')">
                                <svg width="14" height="14"
                                     viewBox="0 0 20 20" fill="none"
                                     stroke="currentColor"
                                     stroke-width="1.5">
                                    <path stroke-linecap="round"
                                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0
                                           002 2h10a2 2 0 002-2V7a2 2 0
                                           00-2-2h-2M9 5a2 2 0 002 2h2a2
                                           2 0 002-2M9 5a2 2 0 012-2h2a2
                                           2 0 012 2m-3 7h3m-3 4h3m-6-4h.01
                                           M9 16h.01"/>
                                </svg>
                                Notes
                            </button>
                            <button class="btn btn-danger btn-sm"
                                onclick="cancelMeeting('${escapeHtml(m.event_id)}')">
                                <svg width="14" height="14"
                                     viewBox="0 0 20 20" fill="none"
                                     stroke="currentColor"
                                     stroke-width="1.5">
                                    <circle cx="10" cy="10" r="8"/>
                                    <path stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M6 10h8"/>
                                </svg>
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }).join('');

    } catch (e) {
        const banner = document.getElementById('errorBanner');
        document.getElementById('errorMsg').textContent = e.message;
        banner.classList.remove('hidden');

        container.innerHTML = `
            <div class="card">
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <svg viewBox="0 0 20 20" fill="none"
                             stroke="currentColor" stroke-width="1.5">
                            <circle cx="10" cy="10" r="8"/>
                            <path stroke-linecap="round"
                                d="M10 6v4m0 2v1"/>
                        </svg>
                    </div>
                    <div class="empty-state-title">
                        Failed to load meetings
                    </div>
                    <div class="empty-state-desc mb-3">
                        ${escapeHtml(e.message)}
                    </div>
                    <button class="btn btn-secondary btn-sm"
                        onclick="loadMeetings()">
                        Try Again
                    </button>
                </div>
            </div>
        `;
    }
}

// ── Schedule Meeting ───────────────────────────────────
async function scheduleMeeting() {
    const clientId = document.getElementById('meetClientId').value.trim();
    const startRaw = document.getElementById('meetStart').value;
    const endRaw   = document.getElementById('meetEnd').value;

    if (!clientId) {
        Toast.error('Please enter a Client ID');
        document.getElementById('meetClientId').focus();
        return;
    }
    if (!startRaw) {
        Toast.error('Please select a start time');
        return;
    }
    if (!endRaw) {
        Toast.error('Please select an end time');
        return;
    }

    const start = new Date(startRaw);
    const end   = new Date(endRaw);

    if (end <= start) {
        Toast.error('End time must be after start time');
        return;
    }

    const btn = document.getElementById('scheduleBtn');
    setLoading(btn, true);

    try {
        const data = {
            client_id:    clientId,
            title:        document.getElementById('meetTitle')
                              .value.trim() || null,
            start_time:   start.toISOString(),
            end_time:     end.toISOString(),
            description:  document.getElementById('meetDesc')
                              .value.trim() || null,
            location:     document.getElementById('meetLocation')
                              .value.trim() || null,
            invite_client: document.getElementById('meetInvite').checked
        };

        const res = await API.post('/meetings', data);

        if (res.ok) {
            Toast.success('Meeting scheduled successfully');
            closeModal('scheduleMeetingModal');

            // Clear form
            ['meetClientId','meetTitle','meetStart',
             'meetEnd','meetLocation','meetDesc'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            document.getElementById('meetInvite').checked = false;

            loadMeetings();
        } else {
            Toast.error(res.detail || 'Failed to schedule meeting');
        }
    } catch (e) {
        Toast.error(e.message);
    } finally {
        setLoading(btn, false);
    }
}

// ── Notes ──────────────────────────────────────────────
function openNotesModal(eventId) {
    document.getElementById('notesEventId').value = eventId;
    document.getElementById('notesText').value = '';
    openModal('notesModal');
}

async function saveNotes() {
    const eventId = document.getElementById('notesEventId').value;
    const notes   = document.getElementById('notesText').value.trim();

    if (!notes) {
        Toast.error('Notes cannot be empty');
        return;
    }

    const btn = document.getElementById('saveNotesBtn');
    setLoading(btn, true);

    try {
        await API.post(`/meetings/${eventId}/notes`, { notes });
        Toast.success('Notes saved to calendar event');
        closeModal('notesModal');
    } catch (e) {
        Toast.error(e.message);
    } finally {
        setLoading(btn, false);
    }
}

// ── Cancel Meeting ─────────────────────────────────────
async function cancelMeeting(eventId) {
    if (!confirm(
        'Cancel this meeting?\n\n' +
        'The event will be removed from your calendar.'
    )) return;

    try {
        await API.delete(
            `/meetings/${eventId}?notify_attendees=true`
        );
        Toast.success('Meeting cancelled');
        loadMeetings();
    } catch (e) {
        Toast.error(e.message);
    }
}

// ── Boot ───────────────────────────────────────────────
loadMeetings();
</script>
