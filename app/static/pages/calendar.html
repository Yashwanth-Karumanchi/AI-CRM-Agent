<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/aria.css">
</head>
<body>
<div class="app-layout">
    <div id="aria-topbar"></div>
    <div class="app-body">
        <div id="aria-sidebar" class="sidebar"></div>
        <div class="main-content">
            <div class="page">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Calendar</h1>
                        <p class="page-subtitle">Upcoming meetings and client consultations</p>
                    </div>
                    <div class="flex gap-2 items-center">
                        <select id="daysFilter" class="input select" style="width:160px" aria-label="Filter meetings by time range">
                            <option value="7">Next 7 days</option>
                            <option value="14">Next 14 days</option>
                            <option value="30" selected>Next 30 days</option>
                            <option value="90">Next 90 days</option>
                        </select>
                        <button id="refreshBtn" class="btn btn-secondary btn-sm">
                            <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M16 16v-5h-5"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M20.49 9A9 9 0 005.64 5.64L4 8m12 8l-1.64 2.36A9 9 0 013.51 11"/>
                            </svg>
                            Refresh
                        </button>
                        <button id="scheduleMeetingBtn" class="btn btn-primary btn-sm">
                            <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                            </svg>
                            Schedule Meeting
                        </button>
                    </div>
                </div>

                <div id="errorBanner" class="alert alert-error mb-4 hidden">
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="10" cy="10" r="8"/>
                        <path stroke-linecap="round" d="M10 7v4m0 2v1"/>
                    </svg>
                    <span id="errorMsg"></span>
                </div>

                <div id="meetingsList">
                    <div class="loading-overlay"><div class="loading-spinner"></div>Loading meetings...</div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Schedule Meeting Modal -->
<div id="scheduleMeetingModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="scheduleModalTitle">
    <div class="modal modal-md">
        <div class="modal-header">
            <span class="modal-title" id="scheduleModalTitle">Schedule Meeting</span>
            <button class="btn btn-ghost btn-icon btn-sm" id="closeScheduleModal" aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label class="input-label" for="meetClientId">Client ID *</label>
                <input id="meetClientId" class="input" placeholder="CL-XXXXXXXX" autocomplete="off">
            </div>
            <div class="input-group">
                <label class="input-label" for="meetTitle">Meeting Title</label>
                <input id="meetTitle" class="input" placeholder="e.g. Initial Consultation">
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label" for="meetStart">Start Time *</label>
                    <input id="meetStart" type="datetime-local" class="input">
                </div>
                <div class="input-group">
                    <label class="input-label" for="meetEnd">End Time *</label>
                    <input id="meetEnd" type="datetime-local" class="input">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label" for="meetLocation">Location</label>
                <input id="meetLocation" class="input" placeholder="Google Meet, Zoom, Office address...">
            </div>
            <div class="input-group">
                <label class="input-label" for="meetDesc">Description</label>
                <textarea id="meetDesc" class="input textarea" rows="2" placeholder="Agenda or notes..."></textarea>
            </div>
            <label class="flex items-center gap-2" style="cursor:pointer;user-select:none">
                <input id="meetInvite" type="checkbox" style="width:16px;height:16px">
                <span class="text-sm text-secondary">Send calendar invite to client</span>
            </label>
        </div>
        <div class="modal-footer">
            <button id="cancelScheduleBtn" class="btn btn-secondary">Cancel</button>
            <button id="scheduleBtn" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
                Schedule Meeting
            </button>
        </div>
    </div>
</div>

<!-- Notes Modal -->
<div id="notesModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="notesModalTitle">
    <div class="modal modal-md">
        <div class="modal-header">
            <span class="modal-title" id="notesModalTitle">Add Meeting Notes</span>
            <button class="btn btn-ghost btn-icon btn-sm" id="closeNotesModal" aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label class="input-label" for="notesText">Notes</label>
                <textarea id="notesText" class="input textarea" rows="6"
                    placeholder="Enter meeting notes, action items, follow-ups..."></textarea>
            </div>
            <input type="hidden" id="notesEventId">
        </div>
        <div class="modal-footer">
            <button id="cancelNotesBtn" class="btn btn-secondary">Cancel</button>
            <button id="saveNotesBtn" class="btn btn-primary">Save Notes</button>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/calendar.js"></script>
<script>
document.getElementById('closeScheduleModal').addEventListener('click', () => closeModal('scheduleMeetingModal'));
document.getElementById('closeNotesModal').addEventListener('click', () => closeModal('notesModal'));
</script>
</body>
</html>
