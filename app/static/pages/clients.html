<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Clients</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/aria.css">
</head>
<body>
<div class="app-layout">
    <div id="aria-topbar"></div>
    <div class="app-body">
        <div id="aria-sidebar" class="sidebar"></div>
        <div class="main-content">
            <div class="page">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Clients</h1>
                        <p class="page-subtitle" id="clientCount">Loading...</p>
                    </div>
                    <div class="flex gap-2">
                        <button id="archivedBtn" class="btn btn-secondary btn-sm">Show Archived</button>
                        <button id="refreshBtn" class="btn btn-secondary btn-sm">
                            <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M16 16v-5h-5"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M20.49 9A9 9 0 005.64 5.64L4 8m12 8l-1.64 2.36A9 9 0 013.51 11"/>
                            </svg>
                            Refresh
                        </button>
                        <a href="/aria/import" class="btn btn-secondary btn-sm">
                            <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                            </svg>
                            Import
                        </a>
                        <button id="newClientBtn" class="btn btn-primary btn-sm">
                            <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                            </svg>
                            New Client
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="flex gap-3 mb-4" style="flex-wrap:wrap">
                    <input id="searchInput" type="text" class="input"
                        style="flex:1;min-width:200px"
                        placeholder="Search by name, company, email...">
                    <select id="priorityFilter" class="input select" style="width:140px">
                        <option value="">All Priorities</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <select id="stageFilter" class="input select" style="width:180px">
                        <option value="">All Stages</option>
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Consultation Scheduled">Consultation Scheduled</option>
                        <option value="Proposal Sent">Proposal Sent</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                </div>

                <div id="errorBanner" class="alert alert-error mb-3 hidden">
                    <span id="errorBannerMsg"></span>
                    <button id="retryBtn" class="btn btn-secondary btn-sm ml-3">Retry</button>
                </div>

                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Client</th><th>Company</th><th>Service</th>
                                <th>Priority</th><th>Stage</th><th>Follow-up</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody">
                            <tr><td colspan="7">
                                <div class="loading-overlay"><div class="loading-spinner"></div>Loading clients...</div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>

                <div id="pagination" class="flex items-center justify-between mt-3 hidden">
                    <div class="text-muted text-sm" id="paginationInfo"></div>
                    <div class="flex gap-2">
                        <button id="prevBtn" class="btn btn-secondary btn-sm">← Prev</button>
                        <button id="nextBtn" class="btn btn-secondary btn-sm">Next →</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Add Client Modal -->
<div id="addClientModal" class="modal-overlay">
    <div class="modal modal-lg">
        <div class="modal-header">
            <span class="modal-title">New Client</span>
            <button class="btn btn-ghost btn-icon btn-sm" id="closeAddClientModal">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label" for="newName">Name *</label>
                    <input id="newName" class="input" placeholder="Full name">
                </div>
                <div class="input-group">
                    <label class="input-label" for="newEmail">Email</label>
                    <input id="newEmail" type="email" class="input" placeholder="email@company.com">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label" for="newCompany">Company</label>
                    <input id="newCompany" class="input" placeholder="Company name">
                </div>
                <div class="input-group">
                    <label class="input-label" for="newPhone">Phone</label>
                    <input id="newPhone" class="input" placeholder="801-555-0000">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label" for="newService">Service</label>
                    <input id="newService" class="input" placeholder="Service requested">
                </div>
                <div class="input-group">
                    <label class="input-label" for="newFollowup">Follow-up Date</label>
                    <input id="newFollowup" type="date" class="input">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label" for="newPriority">Priority</label>
                    <select id="newPriority" class="input select">
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label" for="newStage">Stage</label>
                    <select id="newStage" class="input select">
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Consultation Scheduled">Consultation Scheduled</option>
                        <option value="Proposal Sent">Proposal Sent</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label class="input-label" for="newNotes">Notes</label>
                <textarea id="newNotes" class="input textarea" rows="3" placeholder="Additional notes..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="cancelAddClientModal">Cancel</button>
            <button class="btn btn-primary" id="createClientBtn">Create Client</button>
        </div>
    </div>
</div>

<!-- Client Detail Modal -->
<div id="clientDetailModal" class="modal-overlay">
    <div class="modal modal-lg">
        <div class="modal-header">
            <span class="modal-title" id="detailTitle">Client Details</span>
            <button class="btn btn-ghost btn-icon btn-sm" id="closeDetailModal">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-body" id="detailBody"></div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/clients.js"></script>
<script>
// Wire up remaining modal close buttons (utils openModal/closeModal handles overlays)
document.getElementById('closeAddClientModal').addEventListener('click', () => closeModal('addClientModal'));
document.getElementById('cancelAddClientModal').addEventListener('click', () => closeModal('addClientModal'));
document.getElementById('closeDetailModal').addEventListener('click', () => closeModal('clientDetailModal'));
document.getElementById('retryBtn').addEventListener('click', loadClients);
</script>
</body>
</html>
