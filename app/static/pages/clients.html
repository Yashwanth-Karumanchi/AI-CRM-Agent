<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Clients</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/aria.css">
</head>
<body>
<div class="app-layout">
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-logo">🤖</div>
            <div>
                <div class="topbar-title">ARIA</div>
                <div class="topbar-subtitle">AI Relationship Intelligence</div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="status-dot">Connected</div>
            <button class="btn btn-secondary btn-sm" onclick="logout()">Sign Out</button>
        </div>
    </div>
    <div class="app-body">
        <div class="sidebar">
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-label">Main</div>
                    <a href="/aria/dashboard" class="nav-item"><span class="nav-item-icon">📊</span>Dashboard</a>
                    <a href="/aria/clients" class="nav-item active"><span class="nav-item-icon">👥</span>Clients</a>
                    <a href="/aria/chat" class="nav-item"><span class="nav-item-icon">💬</span>Chat with ARIA</a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-label">Tools</div>
                    <a href="/aria/calendar" class="nav-item"><span class="nav-item-icon">📅</span>Calendar</a>
                    <a href="/aria/email" class="nav-item"><span class="nav-item-icon">📧</span>Email</a>
                    <a href="/aria/reports" class="nav-item"><span class="nav-item-icon">📄</span>Reports</a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-label">Intelligence</div>
                    <a href="/aria/intel" class="nav-item"><span class="nav-item-icon">🧠</span>Intelligence</a>
                    <a href="/aria/search" class="nav-item"><span class="nav-item-icon">🔍</span>Smart Search</a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-stats" id="sidebarStats">
                    <div class="text-muted text-xs">Loading...</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="page">
                <div class="page-header">
                    <div>
                        <div class="page-title">Clients</div>
                        <div class="page-subtitle" id="clientCount">Loading...</div>
                    </div>
                    <div class="flex gap-2">
                        <button class="btn btn-secondary btn-sm" onclick="toggleArchived()">
                            📦 <span id="archivedToggleLabel">Show Archived</span>
                        </button>
                        <button class="btn btn-primary btn-sm" onclick="openModal('addClientModal')">
                            + New Client
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="flex gap-3 mb-4" style="flex-wrap:wrap">
                    <input id="searchInput" type="text"
                        class="input" style="flex:1;min-width:200px"
                        placeholder="Search by name, company, email..."
                        oninput="filterClients()">
                    <select id="priorityFilter" class="input select" style="width:140px" onchange="filterClients()">
                        <option value="">All Priorities</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <select id="stageFilter" class="input select" style="width:180px" onchange="filterClients()">
                        <option value="">All Stages</option>
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Consultation Scheduled">Consultation Scheduled</option>
                        <option value="Proposal Sent">Proposal Sent</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                    <button class="btn btn-secondary btn-sm" onclick="loadClients()">↻</button>
                </div>

                <!-- Table -->
                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Client</th>
                                <th>Company</th>
                                <th>Service</th>
                                <th>Priority</th>
                                <th>Stage</th>
                                <th>Follow-up</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody">
                            <tr><td colspan="7">
                                <div class="loading-overlay">
                                    <div class="loading-spinner"></div>Loading...
                                </div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Client Modal -->
<div id="addClientModal" class="modal-overlay">
    <div class="modal modal-lg">
        <div class="modal-header">
            <span class="modal-title">New Client</span>
            <button class="btn btn-ghost btn-icon" onclick="closeModal('addClientModal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label">Name *</label>
                    <input id="newName" class="input" placeholder="Full name">
                </div>
                <div class="input-group">
                    <label class="input-label">Email</label>
                    <input id="newEmail" type="email" class="input" placeholder="email@company.com">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label">Company</label>
                    <input id="newCompany" class="input" placeholder="Company name">
                </div>
                <div class="input-group">
                    <label class="input-label">Phone</label>
                    <input id="newPhone" class="input" placeholder="801-555-0000">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label">Service</label>
                    <input id="newService" class="input" placeholder="Service requested">
                </div>
                <div class="input-group">
                    <label class="input-label">Follow-up Date</label>
                    <input id="newFollowup" type="date" class="input">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label">Priority</label>
                    <select id="newPriority" class="input select">
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label">Stage</label>
                    <select id="newStage" class="input select">
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Consultation Scheduled">Consultation Scheduled</option>
                        <option value="Proposal Sent">Proposal Sent</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label class="input-label">Notes</label>
                <textarea id="newNotes" class="input textarea" rows="3" placeholder="Additional notes..."></textarea>
            </div>
            <div id="addClientMsg" class="hidden"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('addClientModal')">Cancel</button>
            <button class="btn btn-primary" onclick="createClient()" id="createClientBtn">Create Client</button>
        </div>
    </div>
</div>

<!-- Client Detail Modal -->
<div id="clientDetailModal" class="modal-overlay">
    <div class="modal modal-lg">
        <div class="modal-header">
            <span class="modal-title" id="detailTitle">Client Details</span>
            <button class="btn btn-ghost btn-icon" onclick="closeModal('clientDetailModal')">✕</button>
        </div>
        <div class="modal-body" id="detailBody"></div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/nav.js"></script>
<script>
function logout() { API.clear(); window.location.href = '/aria/'; }
Nav.init();

let allClients = [];
let showArchived = false;

async function loadClients() {
    try:
        const url = showArchived
            ? '/clients?include_archived=true&limit=100'
            : '/clients?limit=100';
        const res = await API.get(url);
        allClients = res.clients || [];
        document.getElementById('clientCount').textContent =
            `${allClients.length} clients`;
        renderTable(allClients);
    } catch(e) {
        Toast.error('Failed to load clients: ' + e.message);
    }
}

function toggleArchived() {
    showArchived = !showArchived;
    document.getElementById('archivedToggleLabel').textContent =
        showArchived ? 'Hide Archived' : 'Show Archived';
    loadClients();
}

function filterClients() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const p = document.getElementById('priorityFilter').value;
    const s = document.getElementById('stageFilter').value;

    const filtered = allClients.filter(c => {
        const text = [c.name, c.company, c.email,
            c.service, c.client_id].join(' ').toLowerCase();
        return (!q || text.includes(q))
            && (!p || c.priority === p)
            && (!s || c.stage === s);
    });

    renderTable(filtered);
}

function renderTable(clients) {
    const tbody = document.getElementById('clientsTableBody');
    if (!clients.length) {
        tbody.innerHTML = `<tr><td colspan="7">
            <div class="empty-state">
                <div class="empty-state-icon">👥</div>
                <div class="empty-state-title">No clients found</div>
                <div class="empty-state-desc">Add your first client to get started</div>
            </div>
        </td></tr>`;
        return;
    }

    tbody.innerHTML = clients.map(c => `
        <tr onclick="viewClient('${c.client_id}')">
            <td>
                <div class="font-semibold">${escapeHtml(c.name)}</div>
                <div class="text-muted text-xs">${escapeHtml(c.client_id)}</div>
            </td>
            <td>${escapeHtml(c.company || '—')}</td>
            <td class="text-xs text-secondary">${escapeHtml(c.service || '—')}</td>
            <td>${priorityBadge(c.priority)}</td>
            <td>${stageBadge(c.stage)}</td>
            <td class="text-xs ${c.next_follow_up && c.next_follow_up < new Date().toISOString().split('T')[0] ? 'text-error' : 'text-muted'}">
                ${c.next_follow_up || '—'}
            </td>
            <td onclick="event.stopPropagation()">
                <div class="flex gap-1">
                    <button class="btn btn-ghost btn-icon btn-sm" title="Score"
                        onclick="quickScore('${c.client_id}')">🎯</button>
                    <button class="btn btn-ghost btn-icon btn-sm" title="Report"
                        onclick="quickReport('${c.client_id}')">📄</button>
                    <button class="btn btn-ghost btn-icon btn-sm" title="Email"
                        onclick="window.location='/aria/email?client=${c.client_id}'">📧</button>
                    <button class="btn btn-ghost btn-icon btn-sm" title="Archive"
                        onclick="archiveClient('${c.client_id}')">🗑</button>
                </div>
            </td>
        </tr>
    `).join('');
}

async function viewClient(clientId) {
    try {
        const res = await API.get(`/clients/${clientId}`);
        const c = res.client;
        document.getElementById('detailTitle').textContent =
            `${c.name} · ${c.client_id}`;

        document.getElementById('detailBody').innerHTML = `
            <div class="grid-2 mb-4">
                <div><div class="input-label">Company</div>
                    <div>${escapeHtml(c.company || '—')}</div></div>
                <div><div class="input-label">Email</div>
                    <div>${escapeHtml(c.email || '—')}</div></div>
                <div><div class="input-label">Phone</div>
                    <div>${escapeHtml(c.phone || '—')}</div></div>
                <div><div class="input-label">Service</div>
                    <div>${escapeHtml(c.service || '—')}</div></div>
                <div><div class="input-label">Priority</div>
                    <div>${priorityBadge(c.priority)}</div></div>
                <div><div class="input-label">Stage</div>
                    <select onchange="updateStage('${c.client_id}', this.value)"
                        class="input select" style="width:100%">
                        ${['New','Contacted','Consultation Scheduled',
                           'Proposal Sent','Won','Lost'].map(s =>
                            `<option ${s===c.stage?'selected':''} value="${s}">${s}</option>`
                        ).join('')}
                    </select></div>
                <div><div class="input-label">Next Follow-up</div>
                    <div>${c.next_follow_up || '—'}</div></div>
                <div><div class="input-label">Created</div>
                    <div>${formatDate(c.created_at)}</div></div>
                <div class="col-span-2" style="grid-column:1/-1">
                    <div class="input-label">Notes</div>
                    <div class="text-secondary">${escapeHtml(c.notes || '—')}</div>
                </div>
            </div>
            <div class="divider"></div>
            <div class="flex gap-2" style="flex-wrap:wrap">
                <button class="btn btn-secondary btn-sm"
                    onclick="quickScore('${c.client_id}')">
                    🎯 Score
                </button>
                <button class="btn btn-secondary btn-sm"
                    onclick="quickReport('${c.client_id}')">
                    📄 Report
                </button>
                <button class="btn btn-secondary btn-sm"
                    onclick="viewActivity('${c.client_id}')">
                    📋 Activity
                </button>
                <button class="btn btn-secondary btn-sm"
                    onclick="viewAudit('${c.client_id}')">
                    🔄 Audit Trail
                </button>
                <button class="btn btn-secondary btn-sm"
                    onclick="rollbackClient('${c.client_id}')">
                    ↩ Rollback Last
                </button>
                <button class="btn btn-danger btn-sm"
                    onclick="archiveClient('${c.client_id}')">
                    🗑 Archive
                </button>
            </div>
            <div id="detailResult" class="mt-3"></div>
        `;
        openModal('clientDetailModal');
    } catch(e) {
        Toast.error('Failed to load client');
    }
}

async function updateStage(clientId, stage) {
    try {
        await API.put(`/clients/${clientId}/stage`, { stage });
        Toast.success('Stage updated');
        await loadClients();
    } catch(e) {
        Toast.error('Failed to update stage');
    }
}

async function archiveClient(clientId) {
    if (!confirm('Archive this client?')) return;
    try {
        await API.delete(`/clients/${clientId}`);
        Toast.success('Client archived');
        closeModal('clientDetailModal');
        await loadClients();
    } catch(e) {
        Toast.error('Failed to archive client');
    }
}

async function quickScore(clientId) {
    try {
        Toast.info('Scoring client...');
        const res = await API.get(`/clients/${clientId}/score`);
        const s = res.score;
        alert(
            `🎯 Lead Score: ${s.lead_score}/10\n` +
            `⚠️ Churn Risk: ${s.churn_risk}\n` +
            `📈 Close Probability: ${s.estimated_close_probability}%\n` +
            `✅ Next Action: ${s.best_next_action}\n\n` +
            `Summary: ${s.summary}`
        );
    } catch(e) {
        Toast.error('Scoring failed: ' + e.message);
    }
}

async function quickReport(clientId) {
    try {
        Toast.info('Generating report...');
        const blob = await API.blob('POST', `/clients/${clientId}/report`);
        downloadBlob(blob, `report_${clientId}.docx`);
        Toast.success('Report downloaded!');
    } catch(e) {
        Toast.error('Report failed: ' + e.message);
    }
}

async function viewActivity(clientId) {
    try {
        const res = await API.get(`/clients/${clientId}/activity`);
        const acts = res.activities || [];
        const el = document.getElementById('detailResult');
        el.innerHTML = `
            <div class="divider"></div>
            <div class="card-title mb-2">Activity Timeline (${acts.length})</div>
            <div style="max-height:200px;overflow-y:auto">
                ${acts.map(a => `
                    <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
                        <span class="text-muted">${formatDateTime(a.timestamp)}</span>
                        <span class="badge badge-stage ml-2">${escapeHtml(a.type)}</span>
                        <span class="text-secondary ml-2">${escapeHtml(a.description)}</span>
                    </div>
                `).join('') || '<div class="text-muted">No activity yet</div>'}
            </div>
        `;
    } catch(e) {
        Toast.error('Failed to load activity');
    }
}

async function viewAudit(clientId) {
    try {
        const res = await API.get(`/clients/${clientId}/audit`);
        const history = res.history || [];
        const el = document.getElementById('detailResult');
        el.innerHTML = `
            <div class="divider"></div>
            <div class="card-title mb-2">Audit Trail (${history.length} changes)</div>
            <div style="max-height:200px;overflow-y:auto">
                ${history.map(h => `
                    <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
                        <span class="text-muted">${formatDateTime(h.timestamp)}</span>
                        <span class="text-accent ml-2">${escapeHtml(h.field)}</span>
                        <span class="text-muted ml-1">
                            ${escapeHtml(h.old_value)} → ${escapeHtml(h.new_value)}
                        </span>
                    </div>
                `).join('') || '<div class="text-muted">No changes recorded</div>'}
            </div>
        `;
    } catch(e) {
        Toast.error('Failed to load audit trail');
    }
}

async function rollbackClient(clientId) {
    if (!confirm('Rollback last change for this client?')) return;
    try {
        const res = await API.post(`/clients/${clientId}/rollback`);
        Toast.success(`Rolled back: ${res.field} → ${res.rolled_back_to}`);
        closeModal('clientDetailModal');
        await loadClients();
    } catch(e) {
        Toast.error('Rollback failed: ' + e.message);
    }
}

async function createClient() {
    const name = document.getElementById('newName').value.trim();
    if (!name) {
        Toast.error('Name is required');
        return;
    }

    const btn = document.getElementById('createClientBtn');
    setLoading(btn, true);

    try {
        const data = {
            name,
            email: document.getElementById('newEmail').value.trim() || null,
            company: document.getElementById('newCompany').value.trim() || null,
            phone: document.getElementById('newPhone').value.trim() || null,
            service: document.getElementById('newService').value.trim() || null,
            priority: document.getElementById('newPriority').value,
            stage: document.getElementById('newStage').value,
            notes: document.getElementById('newNotes').value.trim() || null
        };

        const res = await API.post('/clients', data);

        if (res.ok) {
            Toast.success(`Client created: ${res.client.client_id}`);
            closeModal('addClientModal');
            await loadClients();
            // Clear form
            ['newName','newEmail','newCompany','newPhone',
             'newService','newNotes'].forEach(id => {
                document.getElementById(id).value = '';
            });
        } else {
            Toast.error(res.detail || 'Failed to create client');
        }
    } catch(e) {
        Toast.error(e.message);
    } finally {
        setLoading(btn, false);
    }
}

loadClients();
</script>
</body>
</html>
