<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Smart Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/aria.css">
</head>
<body>
<div class="app-layout">
    <div id="aria-topbar"></div>
    <div class="app-body">
        <div id="aria-sidebar" class="sidebar"></div>
        <div class="main-content">
            <div class="page">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Smart Search</h1>
                        <p class="page-subtitle">Natural language search powered by AI</p>
                    </div>
                </div>

                <!-- Natural Language Search -->
                <div class="card mb-4">
                    <div class="card-header">
                        <span class="card-title">Natural Language Search</span>
                        <span class="text-xs text-muted">Describe what you're looking for</span>
                    </div>
                    <div class="card-body">
                        <div class="flex gap-3">
                            <div class="input-with-icon flex-1">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="11" cy="11" r="8"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/>
                                </svg>
                                <input id="nlInput" class="input"
                                    placeholder="e.g. high priority clients interested in AI automation"
                                    aria-label="Natural language search">
                            </div>
                            <button id="nlSearchBtn" class="btn btn-primary">
                                <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="11" cy="11" r="8"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/>
                                </svg>
                                Search
                            </button>
                        </div>
                        <!-- Quick searches — data-nl drives JS -->
                        <div class="flex gap-2 mt-3" style="flex-wrap:wrap">
                            <button class="quick-action-btn" data-nl="high priority clients not yet contacted">High priority uncontacted</button>
                            <button class="quick-action-btn" data-nl="clients interested in AI automation">AI automation</button>
                            <button class="quick-action-btn" data-nl="clients who need immediate follow up">Need follow-up</button>
                            <button class="quick-action-btn" data-nl="clients likely to close this month">Likely to close</button>
                            <button class="quick-action-btn" data-nl="won deals this quarter">Won deals</button>
                        </div>
                    </div>
                </div>

                <!-- Smart Filter -->
                <div class="card mb-4">
                    <div class="card-header">
                        <span class="card-title">Smart Filter</span>
                        <span class="text-xs text-muted">Complex criteria filtering</span>
                    </div>
                    <div class="card-body">
                        <div class="flex gap-3">
                            <div class="input-with-icon flex-1">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <polygon stroke-linecap="round" stroke-linejoin="round" points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                                </svg>
                                <input id="filterInput" class="input"
                                    placeholder="e.g. clients stuck in proposal stage for too long"
                                    aria-label="Smart filter criteria">
                            </div>
                            <button id="filterBtn" class="btn btn-primary">
                                <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <polygon stroke-linecap="round" stroke-linejoin="round" points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                                </svg>
                                Filter
                            </button>
                        </div>
                        <!-- Quick filters — data-filter drives JS -->
                        <div class="flex gap-2 mt-3" style="flex-wrap:wrap">
                            <button class="quick-action-btn" data-filter="clients with no activity in 2 weeks">Inactive 2 weeks</button>
                            <button class="quick-action-btn" data-filter="high value clients at risk of churning">Churn risk</button>
                            <button class="quick-action-btn" data-filter="clients in proposal stage">In proposal stage</button>
                            <button class="quick-action-btn" data-filter="new clients added this month">New this month</button>
                            <button class="quick-action-btn" data-filter="overdue follow-ups high priority">Overdue + high priority</button>
                        </div>
                    </div>
                </div>

                <!-- Results -->
                <div id="searchResults" class="hidden">
                    <div class="flex items-center justify-between mb-3 gap-4">
                        <div class="flex items-center gap-3">
                            <span class="font-semibold text-primary" id="resultsTitle"></span>
                            <span class="badge badge-stage" id="resultsCount"></span>
                        </div>
                        <div class="text-muted text-xs" id="resultsInterpretation" style="max-width:400px;text-align:right"></div>
                    </div>
                    <div id="resultsContent"></div>
                </div>

            </div>
        </div>
    </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/search.js"></script>
</body>
</html>
