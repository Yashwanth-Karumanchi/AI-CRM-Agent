<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Reports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/aria.css">
</head>
<body>
<div class="app-layout">
    <div id="aria-topbar"></div>
    <div class="app-body">
        <div id="aria-sidebar" class="sidebar"></div>
        <div class="main-content">
            <div class="page">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Reports</h1>
                        <p class="page-subtitle">Download branded Word document reports</p>
                    </div>
                </div>

                <!-- Client Report -->
                <div class="card mb-4">
                    <div class="card-header">
                        <span class="card-title">Client Report</span>
                        <span class="text-xs text-muted">AI-generated intake and analysis</span>
                    </div>
                    <div class="card-body">
                        <div class="flex gap-3 items-center">
                            <div class="input-with-icon" style="max-width:240px">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 20H7m10 0v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2m14-10a4 4 0 11-8 0 4 4 0 018 0z"/>
                                </svg>
                                <input id="reportClientId" class="input" placeholder="CL-XXXXXXXX" autocomplete="off">
                            </div>
                            <button id="clientReportBtn" class="btn btn-primary">
                                <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                                </svg>
                                Generate Report
                            </button>
                        </div>
                        <p class="text-muted text-xs mt-2">AI analyzes the client and generates a full intake report as a Word document</p>
                    </div>
                </div>

                <!-- Report Cards — data-report and data-label drive JS -->
                <div class="grid-2" id="reportCards">

                    <button class="intel-card" data-report="weekly" data-label="Weekly Performance">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <path d="M16 2v4M8 2v4M3 10h18"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Weekly Performance</div>
                        <div class="intel-card-desc">Key metrics, pipeline stage breakdown, high priority clients, recent activities</div>
                        <div class="intel-card-arrow">Download Word Document <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></div>
                    </button>

                    <button class="intel-card" data-report="monthly" data-label="Monthly Pipeline">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m6 0V9a2 2 0 012-2h2a2 2 0 012 2v10m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Monthly Pipeline</div>
                        <div class="intel-card-desc">Full pipeline by stage, all clients listed, monthly activity summary and trends</div>
                        <div class="intel-card-arrow">Download Word Document <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></div>
                    </button>

                    <button class="intel-card" data-report="acquisition" data-label="Client Acquisition">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20H7m10 0v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2m14-10a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Client Acquisition</div>
                        <div class="intel-card-desc">Clients broken down by priority, service type, and pipeline stage</div>
                        <div class="intel-card-arrow">Download Word Document <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></div>
                    </button>

                    <button class="intel-card" data-report="pipeline" data-label="Pipeline Summary">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M16 16v-5h-5"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M20.49 9A9 9 0 005.64 5.64L4 8m12 8l-1.64 2.36A9 9 0 013.51 11"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Pipeline Summary</div>
                        <div class="intel-card-desc">Complete pipeline overview with high priority clients and follow-up status</div>
                        <div class="intel-card-arrow">Download Word Document <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></div>
                    </button>

                    <button class="intel-card" data-report="agent-activity" data-label="Agent Activity">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="10" cy="10" r="3"/>
                                <path stroke-linecap="round" d="M10 2v2m0 12v2M2 10h2m12 0h2M4.93 4.93l1.41 1.41m7.32 7.32l1.41 1.41M4.93 15.07l1.41-1.41m7.32-7.32l1.41-1.41"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Agent Activity</div>
                        <div class="intel-card-desc">All AI operations, CRM activities, system logs and operation success rates</div>
                        <div class="intel-card-arrow">Download Word Document <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></div>
                    </button>

                    <div class="intel-card" style="opacity:0.45;cursor:default;pointer-events:none">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Revenue Report</div>
                        <div class="intel-card-desc">Coming soon — revenue breakdown by service type and client segment</div>
                        <div class="intel-card-arrow"><span class="badge badge-neutral">Coming Soon</span></div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/reports.js"></script>
</body>
</html>
