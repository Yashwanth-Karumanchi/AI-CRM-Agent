<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/aria.css">
</head>
<body>
<div class="app-layout">
    <div id="aria-topbar"></div>
    <div class="app-body">
        <div id="aria-sidebar" class="sidebar"></div>
        <div class="main-content">
            <div class="page">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Intelligence</h1>
                        <p class="page-subtitle">AI-powered pipeline analysis and insights</p>
                    </div>
                </div>

                <!-- Score Single Client -->
                <div class="card mb-4">
                    <div class="card-header">
                        <span class="card-title">Score a Client</span>
                        <span class="text-xs text-muted">AI-powered</span>
                    </div>
                    <div class="card-body">
                        <div class="flex gap-3 items-center">
                            <div class="input-with-icon" style="max-width:240px">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 20H7m10 0v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2m14-10a4 4 0 11-8 0 4 4 0 018 0z"/>
                                </svg>
                                <input id="scoreClientId" class="input" placeholder="CL-XXXXXXXX" autocomplete="off">
                            </div>
                            <button id="scoreBtn" class="btn btn-primary">
                                <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                                Score Client
                            </button>
                        </div>
                        <div id="scoreResult" class="mt-4 hidden"></div>
                    </div>
                </div>

                <!-- Intelligence Cards — data-endpoint & data-title drive JS -->
                <div class="grid-3 mb-4" id="intelCards">

                    <button class="intel-card" data-endpoint="pipeline/score" data-title="Pipeline Health Score">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m6 0V9a2 2 0 012-2h2a2 2 0 012 2v10m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Pipeline Health Score</div>
                        <div class="intel-card-desc">AI health check of your entire pipeline — at-risk clients, stalled deals, priorities</div>
                        <div class="intel-card-arrow">Run Analysis <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></div>
                    </button>

                    <button class="intel-card" data-endpoint="insights/patterns" data-title="Pattern Detection">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="11" cy="11" r="8"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Pattern Detection</div>
                        <div class="intel-card-desc">Find segments, bottlenecks, growth opportunities and risks across all clients</div>
                        <div class="intel-card-arrow">Run Analysis <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></div>
                    </button>

                    <button class="intel-card" data-endpoint="insights/revenue-forecast" data-title="Revenue Forecast">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Revenue Forecast</div>
                        <div class="intel-card-desc">30-day and 90-day revenue projections based on pipeline stage and probability</div>
                        <div class="intel-card-arrow">Run Analysis <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></div>
                    </button>

                    <button class="intel-card" data-endpoint="insights/win-loss" data-title="Win/Loss Analysis">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Win / Loss Analysis</div>
                        <div class="intel-card-desc">What patterns make deals succeed or fail — winning vs losing client profiles</div>
                        <div class="intel-card-arrow">Run Analysis <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></div>
                    </button>

                    <button class="intel-card" data-endpoint="recommendations/daily" data-title="Daily Recommendations">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Daily Recommendations</div>
                        <div class="intel-card-desc">AI-prioritised list of who to contact and exactly what to do today</div>
                        <div class="intel-card-arrow">Run Analysis <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></div>
                    </button>

                    <button class="intel-card" data-endpoint="recommendations/stale?days_inactive=14" data-title="Stale Clients">
                        <div class="intel-card-icon">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                        <div class="intel-card-title">Stale Clients</div>
                        <div class="intel-card-desc">Clients with no activity in 14+ days — who needs immediate re-engagement</div>
                        <div class="intel-card-arrow">Run Analysis <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></div>
                    </button>

                </div>

                <!-- Result Panel -->
                <div id="intelResult" class="result-panel hidden">
                    <div class="result-panel-header">
                        <span class="card-title" id="intelResultTitle">Results</span>
                        <div class="flex items-center gap-3">
                            <span class="text-muted text-xs" id="intelResultTime"></span>
                            <button id="closeResultBtn" class="btn btn-ghost btn-sm">
                                <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                                Close
                            </button>
                        </div>
                    </div>
                    <div class="result-panel-body">
                        <pre id="intelResultContent" class="json-viewer"></pre>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/intel.js"></script>
</body>
</html>
