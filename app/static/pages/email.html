<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/aria.css">
</head>
<body>
<div class="app-layout">
    <div id="aria-topbar"></div>
    <div class="app-body">
        <div id="aria-sidebar" class="sidebar"></div>
        <div class="main-content">
            <div class="page">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Email</h1>
                        <p class="page-subtitle">Send emails and manage Gmail drafts</p>
                    </div>
                    <button id="composeBtn" class="btn btn-primary btn-sm">
                        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                        </svg>
                        Compose
                    </button>
                </div>

                <div class="grid-2">

                    <!-- AI Draft -->
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">AI Draft Email</span>
                            <span class="text-xs text-muted">AI-powered</span>
                        </div>
                        <div class="card-body">
                            <div class="input-group">
                                <label class="input-label" for="aiClientId">Client ID</label>
                                <input id="aiClientId" class="input" placeholder="CL-XXXXXXXX" autocomplete="off">
                            </div>
                            <div class="input-group">
                                <label class="input-label" for="aiInstruction">Instructions</label>
                                <textarea id="aiInstruction" class="input textarea" rows="4"
                                    placeholder="e.g. Write a follow-up email thanking them for the meeting and outlining next steps..."></textarea>
                            </div>
                            <div class="flex gap-2">
                                <button id="draftBtn" class="btn btn-secondary" style="flex:1">
                                    <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                                    </svg>
                                    Save Draft
                                </button>
                                <button id="aiSendBtn" class="btn btn-primary" style="flex:1">
                                    <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                                    </svg>
                                    Draft + Send
                                </button>
                            </div>
                            <div id="aiResult" class="mt-3 hidden"></div>
                        </div>
                    </div>

                    <!-- Gmail Drafts -->
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">Gmail Drafts</span>
                            <button id="refreshDraftsBtn" class="btn btn-ghost btn-sm" aria-label="Refresh drafts">
                                <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M16 16v-5h-5"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.49 9A9 9 0 005.64 5.64L4 8m12 8l-1.64 2.36A9 9 0 013.51 11"/>
                                </svg>
                                Refresh
                            </button>
                        </div>
                        <div class="card-body" id="draftsList">
                            <div class="loading-overlay"><div class="loading-spinner"></div>Loading drafts...</div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Compose Modal -->
<div id="composeModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="composeTitle">
    <div class="modal modal-md">
        <div class="modal-header">
            <span class="modal-title" id="composeTitle">Compose Email</span>
            <button id="cancelComposeBtn" class="btn btn-ghost btn-icon btn-sm" aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label class="input-label" for="compClientId">Client ID *</label>
                <input id="compClientId" class="input" placeholder="CL-XXXXXXXX">
            </div>
            <div class="input-group">
                <label class="input-label" for="compTo">To — override client email (optional)</label>
                <input id="compTo" type="email" class="input" placeholder="Override recipient email">
            </div>
            <div class="input-group">
                <label class="input-label" for="compSubject">Subject *</label>
                <input id="compSubject" class="input" placeholder="Email subject line">
            </div>
            <div class="input-group">
                <label class="input-label" for="compBody">Body *</label>
                <textarea id="compBody" class="input textarea" rows="7" placeholder="Email body..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button id="compDraftBtn" class="btn btn-secondary">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                </svg>
                Save Draft
            </button>
            <button id="compSendBtn" class="btn btn-primary">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
                Send Email
            </button>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/email.js"></script>
</body>
</html>
