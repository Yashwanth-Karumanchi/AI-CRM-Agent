<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/aria.css">
</head>
<body>
<div class="app-layout">
    <div id="aria-topbar"></div>
    <div class="app-body">
        <div id="aria-sidebar" class="sidebar"></div>
        <div class="main-content">
            <div class="page">

                <div class="page-header">
                    <div>
                        <h1 class="page-title">Dashboard</h1>
                        <p class="page-subtitle" id="dashboardDate"></p>
                    </div>
                    <div class="flex gap-2">
                        <button id="refreshBtn" class="btn btn-secondary btn-sm">
                            <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M16 16v-5h-5"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M20.49 9A9 9 0 005.64 5.64L4 8m12 8l-1.64 2.36A9 9 0 013.51 11"/>
                            </svg>
                            Refresh
                        </button>
                        <a href="/aria/clients" class="btn btn-primary btn-sm">
                            <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                            </svg>
                            New Client
                        </a>
                    </div>
                </div>

                <div id="errorBanner" class="alert alert-error mb-4 hidden">
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="10" cy="10" r="8"/>
                        <path stroke-linecap="round" d="M10 7v4m0 2v1"/>
                    </svg>
                    <span id="errorMsg" style="flex:1"></span>
                    <button class="btn btn-secondary btn-sm" id="retryBtn">Retry</button>
                </div>

                <!-- Stat cards -->
                <div class="stat-grid mb-4">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20H7m10 0v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2m14-10a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                        </div>
                        <div class="stat-value" id="statTotal">—</div>
                        <div class="stat-label">Total Clients</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:var(--error-bg);color:var(--error)">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                            </svg>
                        </div>
                        <div class="stat-value text-error" id="statHigh">—</div>
                        <div class="stat-label">High Priority</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:var(--success-bg);color:var(--success)">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="stat-value text-success" id="statWon">—</div>
                        <div class="stat-label">Won</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:var(--warning-bg);color:var(--warning)">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                        <div class="stat-value" style="color:var(--warning)" id="statFollowups">—</div>
                        <div class="stat-label">Follow-ups Due</div>
                    </div>
                </div>

                <!-- Pipeline + High Priority -->
                <div class="grid-2 mb-4">
                    <div class="card">
                        <div class="card-header"><span class="card-title">Pipeline Stages</span></div>
                        <div class="card-body" id="pipelineStages">
                            <div class="loading-overlay"><div class="loading-spinner"></div>Loading...</div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">High Priority</span>
                            <a href="/aria/clients" class="text-sm text-accent">View all →</a>
                        </div>
                        <div class="card-body" id="highPriorityList" style="max-height:300px;overflow-y:auto;">
                            <div class="loading-overlay"><div class="loading-spinner"></div>Loading...</div>
                        </div>
                    </div>
                </div>

                <!-- Follow-ups -->
                <div class="card mb-4">
                    <div class="card-header">
                        <span class="card-title">Follow-ups Due</span>
                        <a href="/aria/clients" class="text-sm text-accent">View all</a>
                    </div>
                    <div class="card-body" id="followupsList" style="max-height:300px;overflow-y:auto;">
                        <div class="loading-overlay"><div class="loading-spinner"></div>Loading...</div>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="card">
                    <div class="card-header"><span class="card-title">Recent Activity</span></div>
                    <div id="recentActivity" style="max-height:300px;overflow-y:auto;">
                        <div class="loading-overlay"><div class="loading-spinner"></div>Loading...</div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
